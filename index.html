<style>

/* ── RESET ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

/* ── TOKENS ── */
:root{
  --bg:        #F4F5F7;
  --primary:  #B8C5D6;
  --accent:    #5D84A0;
  --deep:      #1E3D52;
  --text:      #1A1E24;
  --muted:     #6B7280;
  --light:     #D6DDE8;
  --rule:      #CBD3DE;
  --serif:     'Cormorant Garamond', Georgia, serif;
  --sans:      'DM Sans', sans-serif;
}

body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  cursor:none;
  -webkit-font-smoothing:antialiased;
}

/* ── CUSTOM CURSOR ── */
#cursor{
  position:fixed;width:10px;height:10px;
  background:var(--deep);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform .1s,width .25s,height .25s,background .25s;
  mix-blend-mode:multiply;
}
#cursor-ring{
  position:fixed;width:36px;height:36px;
  border:1.5px solid var(--accent);border-radius:50%;
  pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:transform .18s cubic-bezier(.25,.46,.45,.94),
             width .3s,height .3s,border-color .3s;
}
body:hover #cursor-ring{opacity:1;}
.cursor-grow #cursor{width:20px;height:20px;background:var(--accent);}
.cursor-grow #cursor-ring{width:56px;height:56px;border-color:var(--deep);}

/* ── NAV ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  padding:1.6rem 4rem;
  display:flex;align-items:center;justify-content:space-between;
  transition:background .4s,backdrop-filter .4s,padding .4s;
}
.nav.scrolled{
  background:rgba(244,245,247,.82);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  padding:1rem 4rem;
  border-bottom:1px solid var(--light);
}
.nav-brand{display:flex;flex-direction:column;text-decoration:none;}
.nav-brand-main{
  font-family:var(--serif);font-size:1.15rem;
  font-weight:600;color:var(--deep);letter-spacing:.5px;line-height:1;
}
.nav-brand-sub{
  font-size:.58rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);margin-top:.2rem;font-weight:400;
}
.nav-links{display:flex;align-items:center;gap:2.8rem;}
.nav-links a{
  font-size:.72rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);text-decoration:none;font-weight:400;
  transition:color .2s;
}
.nav-links a:hover{color:var(--deep);}
.nav-cta{
  font-size:.7rem;letter-spacing:2px;text-transform:uppercase;
  background:var(--deep);color:#fff !important;
  padding:.6rem 1.6rem;border-radius:2px;
  transition:background .25s !important;
}
.nav-cta:hover{background:var(--accent) !important;color:#fff !important;}
@media(max-width:768px){.nav-links{display:none;}.nav{padding:1.2rem 2rem;}}

/* ── HERO (ปรับช่องว่างด้านบนให้ตัวหนังสือตกลงมาสวยงาม) ── */
.hero{
  min-height:100vh;
  background:linear-gradient(160deg,var(--bg) 0%,#E8EDF4 40%,var(--light) 100%);
  display:flex;
  align-items: center; /* เปลี่ยนเป็นกึ่งกลางในแนวตั้งแทนแนวราบด้านล่าง เพื่อลดการชนข้างบน */
  padding: 8rem 4rem 4rem; /* เพิ่ม Padding ด้านบนจากเดิมขยับหนีแถบเมนู */
  position:relative;overflow:hidden;
}
.hero-canvas{
  position:absolute;inset:0;overflow:hidden;pointer-events:none;
}

/* ปรับวงกลมพื้นหลังให้คลีนและมินิมอลตามใจชอบ ไม่รกรุงรัง */
.hero-geo{
  position:absolute;
  border:1px solid var(--primary);
  opacity:.15; /* ปรับลดความโปร่งแสงลงเพื่อให้มินิมอล */
}
.hero-geo-1{
  width:520px;height:520px;border-radius:50%;
  top:-80px;right:-80px;
  animation:float1 12s ease-in-out infinite;
}
.hero-geo-2{
  width:280px;height:280px;border-radius:50%; /* ปรับเหลี่ยมให้กลายเป็นวงกลมมินิมอล */
  top:20%;right:18%;
}
.hero-geo-3{
  width:160px;height:160px;border-radius:50%;
  bottom:25%;right:10%;
  background:transparent; /* เอาพื้นหลังทึบออกให้เหลือแค่เส้น */
  border: 1px solid var(--primary);
}
.hero-geo-4{
  width:400px;height:1px;
  top:42%;left:-40px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:.2;
}

/* วงกลมหมุน ๆ ขนาดเท่าเดิม แต่ดีไซน์แบบ Minimal เส้นบางสะอาดตา */
.hero-badge{
  position:absolute;top:50%;right:6rem;transform:translateY(-50%);
  width:160px;height:160px;
  border:1px solid rgba(93, 132, 160, 0.2); /* ปรับเส้นขอบให้บางลง */
  border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.3rem;
  animation:spin 30s linear infinite;
  z-index: 1;
}
.hero-badge span{
  font-size:.55rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);font-weight:400;
}
.hero-badge strong{
  font-family:var(--serif);font-size:1.8rem;font-weight:300;
  color:var(--deep);line-height:1;
}

@keyframes spin{from{transform:translateY(-50%) rotate(0)}to{transform:translateY(-50%) rotate(360deg)}}
@keyframes float1{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.03) translateY(-20px)}}

.hero-content{
  position:relative;
  z-index:10; /* ดันตัวหนังสือให้มาอยู่แถวหน้าสุด ไม่โดนอะไรทับ */
  max-width:780px;
  margin-top: 2rem; /* ขยับกลุ่มข้อความลงมาข้างล่างเพื่อหลบปุ่มเมนู */
}
.hero-eyebrow{
  font-size:.6rem;letter-spacing:4px;text-transform:uppercase;
  color:var(--accent);margin-bottom:1.6rem;
  display:flex;align-items:center;gap:.8rem;
  font-weight:400;
}
.hero-eyebrow::before{content:'';width:40px;height:1px;background:var(--accent);}
.hero-h1{
  font-family:var(--serif);
  font-size:clamp(4rem, 8.5vw, 8rem); /* ปรับขนาดสเกลลงเล็กน้อยไม่ให้ล้นไปชนขอบบน */
  font-weight:300;line-height:.95;
  letter-spacing:-2px;color:var(--deep);
  margin-bottom:2.5rem;
}
.hero-h1 em{font-style:italic;color:var(--accent);font-weight:300;}
.hero-h1 .indent{padding-left:5rem;}
.hero-rule{width:64px;height:1px;background:var(--rule);margin-bottom:1.8rem;}
.hero-p{
  font-size:1rem;color:var(--muted);line-height:1.9;
  font-weight:300;max-width:480px;margin-bottom:3rem;
}
.hero-actions{display:flex;align-items:center;gap:2rem;}
.btn-primary{
  font-size:.7rem;letter-spacing:2.5px;text-transform:uppercase;
  background:var(--deep);color:#fff;
  padding:.85rem 2.5rem;border:none;
  font-family:var(--sans);font-weight:400;
  cursor:none;text-decoration:none;
  transition:background .25s,transform .2s;display:inline-block;
}
.btn-primary:hover{background:var(--accent);transform:translateY(-2px);}
.btn-ghost{
  font-size:.7rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--deep);text-decoration:none;
  border-bottom:1px solid var(--rule);padding-bottom:2px;
  font-weight:400;transition:border-color .2s,color .2s;
}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.hero-scroll{
  position:absolute;bottom:3rem;right:4rem;
  display:flex;flex-direction:column;align-items:center;gap:.6rem;
  font-size:.55rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);
}
.hero-scroll-line{
  width:1px;height:60px;
  background:linear-gradient(180deg,var(--accent),transparent);
  animation:scrollLine 2s ease-in-out infinite;
}
@keyframes scrollLine{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

/* ── MARQUEE ── */
.marquee-wrap{
  background:var(--deep);
  padding:1.1rem 0;overflow:hidden;
}
.marquee-track{
  display:flex;gap:0;width:max-content;
  animation:marquee 35s linear infinite;
}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.m-item{
  font-family:var(--serif);font-size:1rem;font-weight:300;font-style:italic;
  color:rgba(255,255,255,.5);
  padding:0 2.5rem;white-space:nowrap;
  display:flex;align-items:center;gap:2.5rem;
}
.m-item::after{content:'·';color:var(--accent);font-style:normal;}

/* ── SECTION BASE ── */
section{padding:120px 0;}
.wrap{max-width:1200px;margin:0 auto;padding:0 4rem;}
@media(max-width:768px){.wrap{padding:0 1.5rem;}}

/* ── SECTION LABEL ── */
.s-label{
  font-size:.58rem;letter-spacing:4px;text-transform:uppercase;
  color:var(--accent);margin-bottom:.8rem;font-weight:400;
  display:flex;align-items:center;gap:.8rem;
}
.s-label::before{content:'';width:28px;height:1px;background:var(--accent);}

/* ── EDITORIAL 2-COL ── */
.editorial{background:var(--bg);}
.editorial-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8rem;align-items:start;
}
@media(max-width:900px){.editorial-grid{grid-template-columns:1fr;gap:4rem;}}
.editorial-left{}
.ed-h2{
  font-family:var(--serif);
  font-size:clamp(2.5rem,4vw,4.2rem);
  font-weight:300;line-height:1.1;
  color:var(--deep);letter-spacing:-.5px;
  margin:1rem 0 2rem;
}
.ed-h2 em{font-style:italic;color:var(--accent);}
.ed-body{font-size:.9rem;color:var(--muted);line-height:2;font-weight:300;margin-bottom:1.5rem;}
.ed-stat-row{
  display:flex;gap:3rem;
  border-top:1px solid var(--rule);
  padding-top:2.5rem;margin-top:2.5rem;
}
.ed-stat-n{
  font-family:var(--serif);font-size:3rem;font-weight:300;
  color:var(--deep);line-height:1;display:block;
}
.ed-stat-l{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:.5rem;display:block;}

.editorial-right{padding-top:4rem;}
.ed-img-frame{
  aspect-ratio:3/4;
  background:linear-gradient(145deg,#D6DDE8,var(--primary));
  position:relative;overflow:hidden;margin-bottom:1.5rem;
}
.ed-img-inner{
  position:absolute;inset:2rem;
  background:linear-gradient(180deg,#E8EDF4,var(--light));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;
}
.ed-img-inner span{
  font-family:var(--serif);font-size:5rem;font-weight:300;color:var(--deep);opacity:.15;line-height:1;
}
.ed-img-inner p{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--accent);}
.ed-caption{font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}

/* ── PROGRAMMES ── */
.programmes{background:#EEF1F5;}
.prog-head{margin-bottom:5rem;}
.prog-h2{
  font-family:var(--serif);font-size:clamp(2.5rem,4vw,4rem);
  font-weight:300;color:var(--deep);
  line-height:1.1;margin:1rem 0;
}
.prog-h2 em{font-style:italic;color:var(--accent);}
.prog-sub{font-size:.88rem;color:var(--muted);line-height:1.8;max-width:480px;font-weight:300;}

.prog-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;
  align-items:start;
}
.prog-grid .card:nth-child(2){margin-top:4rem;}
.prog-grid .card:nth-child(3){margin-top:8rem;}
@media(max-width:900px){
  .prog-grid{grid-template-columns:1fr;}
  .prog-grid .card:nth-child(2),.prog-grid .card:nth-child(3){margin-top:0;}
}
.card{
  background:var(--bg);
  padding:3rem 2.5rem;
  border:1px solid var(--light);
  position:relative;overflow:hidden;
  transition:transform .4s cubic-bezier(.25,.46,.45,.94),
             box-shadow .4s,border-color .4s;
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 32px 64px rgba(30,61,82,.1);
  border-color:var(--accent);
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--primary));
  transform:scaleX(0);transform-origin:left;
  transition:transform .4s cubic-bezier(.25,.46,.45,.94);
}
.card:hover::before{transform:scaleX(1);}
.card-num{
  font-family:var(--serif);font-size:6rem;font-weight:300;
  color:var(--light);line-height:1;margin-bottom:1.5rem;
  transition:color .3s;
}
.card:hover .card-num{color:var(--primary);}
.card-tag{
  font-size:.58rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);margin-bottom:.6rem;display:block;font-weight:400;
}
.card-title{
  font-family:var(--serif);font-size:1.8rem;font-weight:400;
  color:var(--deep);line-height:1.2;margin-bottom:1.2rem;
}
.card-body{font-size:.82rem;color:var(--muted);line-height:1.9;font-weight:300;}
.card-arrow{
  display:inline-flex;align-items:center;gap:.5rem;
  font-size:.62rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent);text-decoration:none;margin-top:2rem;
  border-bottom:1px solid transparent;transition:border-color .2s;
}
.card-arrow:hover{border-color:var(--accent);}

/* ── PULL QUOTE ── */
.pull-quote{
  background:var(--deep);
  padding:120px 0;
}
.pq-inner{
  max-width:900px;margin:0 auto;padding:0 4rem;
  text-align:center;
}
.pq-rule{width:40px;height:1px;background:var(--accent);margin:0 auto 3rem;}
.pq-quote{
  font-family:var(--serif);
  font-size:clamp(2rem,4vw,3.8rem);
  font-weight:300;font-style:italic;
  color:#fff;line-height:1.35;
  letter-spacing:-.3px;margin-bottom:3rem;
}
.pq-quote em{color:var(--primary);font-style:normal;}
.pq-attr{
  font-size:.62rem;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.3);
}
.pq-stats{
  display:flex;justify-content:center;gap:6rem;
  margin-top:5rem;padding-top:4rem;
  border-top:1px solid rgba(255,255,255,.08);
}
@media(max-width:600px){.pq-stats{gap:3rem;}}
.pq-stat-n{
  font-family:var(--serif);font-size:3.5rem;font-weight:300;color:#fff;
  display:block;line-height:1;
}
.pq-stat-l{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:.6rem;display:block;}

/* ── FEATURES ROW ── */
.features{background:var(--bg);}
.feat-h2{
  font-family:var(--serif);font-size:clamp(2.5rem,3.5vw,3.8rem);
  font-weight:300;color:var(--deep);
  line-height:1.1;margin:1rem 0 5rem;max-width:600px;
}
.feat-h2 em{font-style:italic;color:var(--accent);}
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--rule);}
@media(max-width:800px){.feat-grid{grid-template-columns:1fr 1fr;}}
.feat-item{
  padding:2.5rem;border-right:1px solid var(--rule);
  transition:background .3s;
}
.feat-item:last-child{border-right:none;}
.feat-item:hover{background:#EEF1F5;}
.feat-icon{font-size:1.5rem;margin-bottom:1.5rem;display:block;}
.feat-title{
  font-family:var(--serif);font-size:1.1rem;font-weight:500;
  color:var(--deep);margin-bottom:.6rem;
}
.feat-body{font-size:.78rem;color:var(--muted);line-height:1.8;font-weight:300;}

/* ── APPLY / NEWSLETTER ── */
.apply-section{
  background:var(--deep);
  padding:120px 0;
}
.apply-inner{max-width:820px;margin:0 auto;padding:0 4rem;text-align:center;}
.apply-label{
  font-size:.6rem;letter-spacing:4px;text-transform:uppercase;
  color:var(--primary);margin-bottom:1.2rem;display:block;font-weight:400;
}
.apply-h2{
  font-family:var(--serif);font-size:clamp(2.5rem,5vw,5rem);
  font-weight:300;font-style:italic;color:#fff;
  line-height:1.1;margin-bottom:1.5rem;letter-spacing:-.5px;
}
.apply-p{font-size:.9rem;color:rgba(255,255,255,.4);line-height:1.9;font-weight:300;margin-bottom:4rem;}
.apply-form{
  display:grid;gap:1rem;text-align:left;
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}}
.form-group{display:flex;flex-direction:column;gap:.4rem;}
.form-label{
  font-size:.58rem;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(255,255,255,.3);font-weight:400;
}
.form-input{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  padding:.85rem 1.2rem;
  font-family:var(--sans);font-size:.85rem;
  color:#fff;outline:none;
  transition:border-color .2s,background .2s;
}
.form-input::placeholder{color:rgba(255,255,255,.2);}
.form-input:focus{border-color:var(--primary);background:rgba(255,255,255,.09);}
.form-select{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  padding:.85rem 1.2rem;
