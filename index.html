<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>โรงเรียนอิสลาฮียะห์ | Islahiah School - Yala, Thailand</title>
    
    <meta name="description" content="เว็บไซต์อย่างเป็นทางการของโรงเรียนอิสลาฮียะห์ จ.ยะลา บูรณาการการศึกษาอิสลามและวิชาสามัญ มุ่งมั่นพัฒนาผู้เรียนสู่ความเป็นเลิศตั้งแต่ปี 1946">
    
    <meta name="keywords" content="อิสลาฮียะห์, อิสลาฮียะฮ์, โรงเรียนอิสลาฮียะห์, โรงเรียนอิสลาฮียะฮ์, islahiah, islahiyah, islahiah school, islahiyah school, โรงเรียนอิสลาฮียะห์ ยะลา, โรงเรียนในยะลา, เรียนต่อยะลา, สถาบันปอเนาะยะลา, โรงเรียนเอกชนสอนศาสนาอิสลาม ยะลา">
    
    <meta property="og:title" content="โรงเรียนอิสลาฮียะห์ | Islahiah School">
    <meta property="og:description" content="บูรณาการการศึกษาอิสลามและวิชาสามัญ มุ่งมั่นพัฒนาผู้เรียนสู่ความเป็นเลิศ">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://islahiah.ac.th/">
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        /* --- RESET CSS --- */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        /* --- DESIGN TOKENS --- */
        :root {
            --bg: #F4F5F7;
            --primary: #B8C5D6;
            --accent: #5D84A0;
            --deep: #1E3D52;
            --text: #1A1E24;
            --muted: #6B7280;
            --white: #FFFFFF;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4%;
            z-index: 10;
        }

        /* จัดโครงสร้างโลโก้และชื่อให้อยู่แถวเดียวกัน */
        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* ปรับขนาดการแสดงผลของโลโก้วงกลม */
        .logo-section img {
            height: 50px;
            width: auto;
            object-fit: contain;
        }

        .logo-text h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            color: var(--deep);
            font-weight: 500;
            line-height: 1.2;
        }

        .logo-text p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        nav a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--accent);
        }

        .btn-apply {
            background-color: var(--deep);
            color: var(--white);
            padding: 0.8rem 2rem;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: background-color 0.3s ease;
        }

        .btn-apply:hover {
            background-color: var(--accent);
        }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 4%;
            background: radial-gradient(circle at 85% 50%, rgba(230, 235, 242, 0.6) 0%, rgba(244, 245, 247, 1) 70%);
        }

        .hero-content {
            max-width: 650px;
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 5.5rem;
            font-weight: 300;
            color: var(--deep);
            line-height: 1.05;
            margin-bottom: 2.5rem;
        }

        .hero h1 span {
            font-style: italic;
            font-weight: 400;
            color: var(--accent);
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--muted);
            margin-bottom: 3rem;
            max-width: 540px;
            line-height: 1.8;
        }

        .hero-cta {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        .btn-primary {
            background-color: var(--deep);
            color: var(--white);
            padding: 1rem 2.5rem;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--accent);
        }

        .btn-secondary {
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 4px;
        }

        .btn-secondary::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 2px;
            background-color: var(--text);
            transition: width 0.3s ease;
        }

        .btn-secondary:hover::after {
            width: 100%;
        }

        /* --- BACKGROUND DECORATION --- */
        .decor-container {
            position: absolute;
            right: 0;
            top: 0;
            width: 50vw;
            height: 100vh;
            overflow: hidden;
            pointer-events: none;
        }

        .circle-large {
            position: absolute;
            top: 15%;
            right: -10vw;
            width: 45vw;
            height: 45vw;
            border: 1px solid rgba(93, 132, 160, 0.15);
            border-radius: 50%;
        }

        .circle-filled {
            position: absolute;
            bottom: -5%;
            right: -5vw;
            width: 35vw;
            height: 35vw;
            background: linear-gradient(135deg, rgba(235, 240, 245, 0.4) 0%, rgba(220, 228, 238, 0.2) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .badge-rotate {
            width: 130px;
            height: 130px;
            border: 1px dashed var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translate(-30%, -20%);
        }

        .badge-text {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            text-align: center;
            font-weight: 600;
            line-height: 1.4;
        }

        /* RESPONSIVE LAYOUT */
        @media (max-width: 1024px) {
            header { padding: 1.5rem 5%; }
            nav { display: none; }
            .hero h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <img src="logo colour.png" alt="Islahiah School Logo">
            <div class="logo-text">
                <h2>Islahiah School</h2>
                <p>Est. 1946 · Yala, Thailand</p>
            </div>
        </div>
        
        <nav>
            <a href="#about">About</a>
            <a href="#programmes">Programmes</a>
            <a href="#contact">Contact</a>
            <a href="#apply" class="btn-apply">Apply Now</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Shaping<br><span>Leaders</span><br>of Tomorrow</h1>
                <p>An integrated Islamic and academic education in Yala, Thailand — nurturing Muslim learners with knowledge, character, and faith since 1946.</p>
                <div class="hero-cta">
                    <a href="#apply" class="btn-primary">Apply Now</a>
                    <a href="#explore" class="btn-secondary">Discover More</a>
                </div>
            </div>

            <div class="decor-container">
                <div class="circle-large"></div>
                <div class="circle-filled">
                    <div class="badge-rotate">
                        <div class="badge-text">Yala<br>Islah<br>Thailand</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
